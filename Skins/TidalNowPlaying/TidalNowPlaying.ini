[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TIDAL Now Playing
Author=Claude
Information=Shows the current TIDAL track via Windows media controls (SMTC). Reads a file written by poll-smtc.ps1.

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
NP=%LOCALAPPDATA%\TidalNowPlaying\nowplaying.txt
Col=255,255,255,255
Col2=255,255,255,180
Shadow=0,0,0,200

[mNP]
Measure=Plugin
Plugin=WebParser
URL=file://#NP#
RegExp=(?siU)STATUS=(.*)\r?\nARTIST=(.*)\r?\nTITLE=(.*)\r?\nALBUM=(.*)\r?\nAPP=
CodePage=Utf8
UpdateRate=1

[mStatus]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=1

[mArtist]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=2

[mTitle]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=3

; invisible container that fixes the window width so the centered text stays centered
[MeterBG]
Meter=Shape
Shape=Rectangle 0,0,1200,240 | Fill Color 0,0,0,1 | StrokeWidth 0

[MeterLabel]
Meter=String
X=600
Y=4
StringAlign=Center
FontColor=#Col2#
FontFace=Segoe UI
FontSize=22
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=TIDAL

[MeterTitle]
Meter=String
MeasureName=mTitle
X=600
Y=10R
W=1100
StringAlign=Center
ClipString=2
FontColor=#Col#
FontFace=Segoe UI Light
FontSize=66
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1

[MeterArtist]
Meter=String
MeasureName=mArtist
X=600
Y=10R
W=1100
StringAlign=Center
ClipString=2
FontColor=#Col2#
FontFace=Segoe UI
FontSize=36
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1
