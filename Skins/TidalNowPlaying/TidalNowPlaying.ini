[Rainmeter]
Update=130
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TIDAL Now Playing
Author=Claude
Information=Current TIDAL track via Windows media controls (SMTC). Long titles scroll (marquee); album art is fetched from the iTunes Search API. Reads a file written by poll-smtc.ps1.

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
NP=%LOCALAPPDATA%\TidalNowPlaying\nowplaying.txt
Col=255,255,255,255
Col2=255,255,255,180
Shadow=0,0,0,200
Window=18
; X position of the text when a cover is shown / when it is not:
TextX=450
TextX0=20

[mNP]
Measure=Plugin
Plugin=WebParser
URL=file://#NP#
RegExp=(?siU)STATUS=(.*)\r?\nARTIST=(.*)\r?\nTITLE=(.*)\r?\nALBUM=(.*)\r?\nAPP=(.*)\r?\nCOVER=(.*)$
CodePage=Utf8
UpdateRate=8
ForceReload=1

[mStatus]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=1

[mArtist]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=2

[mTitle]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=3

; cover path (empty = no art found) - toggles the layout between art+text and text-only
[mCover]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=6
DynamicVariables=1
IfMatch=^$
IfMatchAction=[!HideMeter MeterCover][!SetOption MeterTitle X #TextX0#][!SetOption MeterArtist X #TextX0#]
IfNotMatchAction=[!ShowMeter MeterCover][!SetOption MeterTitle X #TextX#][!SetOption MeterArtist X #TextX#]

[MeasureScroll]
Measure=Script
ScriptFile=marquee.lua
UpdateDivider=4

[MeterCover]
Meter=Image
ImageName=[mCover]
X=20
Y=20
W=400
H=400
PreserveAspectRatio=1
DynamicVariables=1

[MeterTitle]
Meter=String
X=450
Y=10
W=1040
H=170
StringAlign=Left
ClipString=1
FontColor=#Col#
FontFace=Segoe UI Light
FontSize=88
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
DynamicVariables=1
Text=

[MeterArtist]
Meter=String
MeasureName=mArtist
X=450
Y=190
W=1040
StringAlign=Left
ClipString=1
FontColor=#Col2#
FontFace=Segoe UI
FontSize=46
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1
