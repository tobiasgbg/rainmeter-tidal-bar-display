[Rainmeter]
Update=130
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TIDAL Now Playing
Author=Claude
Information=Current TIDAL track via Windows media controls (SMTC). Long titles scroll (marquee). Reads a file written by poll-smtc.ps1.

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
NP=%LOCALAPPDATA%\TidalNowPlaying\nowplaying.txt
Col=255,255,255,255
Col2=255,255,255,180
Shadow=0,0,0,200
Window=30

[mNP]
Measure=Plugin
Plugin=WebParser
URL=file://#NP#
RegExp=(?siU)STATUS=(.*)\r?\nARTIST=(.*)\r?\nTITLE=(.*)\r?\nALBUM=(.*)\r?\nAPP=
CodePage=Utf8
UpdateRate=8
ForceReload=1

[mStatus]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=1

[mArtist]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=2

[mTitle]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=3

[MeasureScroll]
Measure=Script
ScriptFile=marquee.lua
UpdateDivider=4

[MeterTitle]
Meter=String
X=20
Y=10
W=1500
H=170
StringAlign=Left
ClipString=1
FontColor=#Col#
FontFace=Segoe UI Light
FontSize=88
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
DynamicVariables=1
Text=

[MeterArtist]
Meter=String
MeasureName=mArtist
X=20
Y=185
W=1500
StringAlign=Left
ClipString=1
FontColor=#Col2#
FontFace=Segoe UI
FontSize=46
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1
