[Rainmeter]
Update=130
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TIDAL Now Playing
Author=Claude
Information=Current TIDAL track via Windows media controls (SMTC). Long titles scroll (marquee). Reads a file written by poll-smtc.ps1.

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
NP=%LOCALAPPDATA%\TidalNowPlaying\nowplaying.txt
Col=255,255,255,255
Col2=255,255,255,180
Shadow=0,0,0,200
Window=30

[mNP]
Measure=Plugin
Plugin=WebParser
URL=file://#NP#
RegExp=(?siU)STATUS=(.*)\r?\nARTIST=(.*)\r?\nTITLE=(.*)\r?\nALBUM=(.*)\r?\nAPP=
CodePage=Utf8
UpdateRate=8
ForceReload=1

; show the widget only while something is actually playing; hide it otherwise
[mStatus]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=1
IfMatch=^Playing$
IfMatchAction=[!ShowMeter MeterTitle][!ShowMeter MeterArtist]
IfNotMatchAction=[!HideMeter MeterTitle][!HideMeter MeterArtist]

[mArtist]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=2

[mTitle]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=3

; Disabled: Rainmeter's Lua<->core string bridge converts via the ANSI codepage,
; which destroys non-Latin titles (Korean/Hangul -> "?"). The title is now bound
; directly to [mTitle] on MeterTitle so it stays Unicode all the way to the renderer.
; Trade-off: long titles clip instead of scrolling. (marquee.lua kept but unused.)
[MeasureScroll]
Measure=Script
ScriptFile=marquee.lua
UpdateDivider=4
Disabled=1

[MeterTitle]
Meter=String
MeasureName=mTitle
X=20
Y=10
W=1500
H=170
StringAlign=Left
ClipString=1
FontColor=#Col#
FontFace=Malgun Gothic Semilight
FontSize=88
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1

[MeterArtist]
Meter=String
MeasureName=mArtist
X=20
Y=185
W=1500
StringAlign=Left
ClipString=1
FontColor=#Col2#
FontFace=Malgun Gothic
FontSize=46
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1
