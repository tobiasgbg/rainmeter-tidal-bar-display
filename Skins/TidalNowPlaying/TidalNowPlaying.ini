[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=TIDAL Now Playing
Author=Claude
Information=Shows the current TIDAL track via Windows media controls (SMTC). Reads a file written by poll-smtc.ps1.

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
NP=%LOCALAPPDATA%\TidalNowPlaying\nowplaying.txt
Col=255,255,255,255
Col2=255,255,255,170
Shadow=0,0,0,190

[mNP]
Measure=Plugin
Plugin=WebParser
URL=file://#NP#
RegExp=(?siU)STATUS=(.*)\r?\nARTIST=(.*)\r?\nTITLE=(.*)\r?\nALBUM=(.*)\r?\nAPP=
CodePage=Utf8
UpdateRate=1

[mStatus]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=1

[mArtist]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=2

[mTitle]
Measure=Plugin
Plugin=WebParser
URL=[mNP]
StringIndex=3

[MeterLabel]
Meter=String
X=2
Y=0
FontColor=#Col2#
FontFace=Segoe UI
FontSize=13
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=TIDAL

[MeterTitle]
Meter=String
MeasureName=mTitle
X=0
Y=20
W=700
H=44
ClipString=1
FontColor=#Col#
FontFace=Segoe UI Light
FontSize=30
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1

[MeterArtist]
Meter=String
MeasureName=mArtist
X=2
Y=66
W=700
H=30
ClipString=1
FontColor=#Col2#
FontFace=Segoe UI
FontSize=18
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1
