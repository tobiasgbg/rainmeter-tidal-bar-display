[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Weather
Author=Claude
Information=Tiny weather above the clock, styled like the Typography clock. Reads weather.txt written by poll-smtc.ps1 (Open-Meteo, no API key).

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
WX=%LOCALAPPDATA%\TidalNowPlaying\weather.txt
WhiteFull=255,255,255,255
Shadow=0,0,0,64

[mWX]
Measure=Plugin
Plugin=WebParser
URL=file://#WX#
RegExp=(?siU)TEMP=(.*)\r?\nCOND=(.*)\r?\nICON=(.*)$
CodePage=Utf8
UpdateRate=10
ForceReload=1

[mTemp]
Measure=Plugin
Plugin=WebParser
URL=[mWX]
StringIndex=1

[mCond]
Measure=Plugin
Plugin=WebParser
URL=[mWX]
StringIndex=2

; same look as the Typography clock: Segoe UI Light, white, soft shadow, slight transparency
[StyleClock]
FontFace=Segoe UI Light
FontColor=#WhiteFull#
StringEffect=Shadow
FontEffectColor=#Shadow#
Transparency=192
AntiAlias=1
StringAlign=Right

[MeterTemp]
Meter=String
MeasureName=mTemp
MeterStyle=StyleClock
X=380
Y=0
W=380
FontSize=88
Text=%1

[MeterCond]
Meter=String
MeasureName=mCond
MeterStyle=StyleClock
X=380
Y=104
W=380
FontSize=18
Text=%1
