[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Weather
Author=Claude
Information=Tiny weather above the clock. Reads weather.txt written by poll-smtc.ps1 (Open-Meteo, no API key).

[Variables]
; Path is set automatically by INSTALL.cmd for the current user:
WX=%LOCALAPPDATA%\TidalNowPlaying\weather.txt
WhiteFull=255,255,255,255
Dim=255,255,255,175
Shadow=0,0,0,128

[mWX]
Measure=Plugin
Plugin=WebParser
URL=file://#WX#
RegExp=(?siU)TEMP=(.*)\r?\nCOND=(.*)\r?\nICON=(.*)$
CodePage=Utf8
UpdateRate=10
ForceReload=1

[mTemp]
Measure=Plugin
Plugin=WebParser
URL=[mWX]
StringIndex=1

[mCond]
Measure=Plugin
Plugin=WebParser
URL=[mWX]
StringIndex=2

[mIcon]
Measure=Plugin
Plugin=WebParser
URL=[mWX]
StringIndex=3

[MeterTemp]
Meter=String
MeasureName=mTemp
X=380
Y=0
W=380
StringAlign=Right
FontFace=Segoe UI Light
FontColor=#WhiteFull#
FontSize=46
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text=%1

[MeterCond]
Meter=String
MeasureName=mIcon
MeasureName2=mCond
X=380
Y=64
W=380
StringAlign=Right
FontFace=Segoe UI Symbol
FontColor=#Dim#
FontSize=22
StringEffect=Shadow
FontEffectColor=#Shadow#
AntiAlias=1
Text="%1  %2"
